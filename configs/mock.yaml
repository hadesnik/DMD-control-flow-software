# Mock hardware config for Phase 1/1.5 end-to-end tests and experiments.
# Selector for the hardware factory in experiment scripts.
hardwareKind: mock

# DMD configuration. Consumed by tfp.hardware.MockDMD.initialize.
dmd:
  nRows: 800
  nCols: 1280
  maxPatternRate: 12500
  loadLatencyMsPerPattern: 0
  debugFigure: false

# DAQ configuration. Consumed by tfp.hardware.MockDAQ.initialize.
# Experiments configure all channels before running Sequencer.
daq:
  sampleRate: 10000
  analogInChannels: [0, 1]
  analogOutChannels: [0]
  digitalOutChannels: [port0/line0]
  digitalInChannels: [port0/line2]   # ScanImage frame clock
  aiRangeV: [-5, 5]

# Filesystem paths. Experiments create <dataDir>/<sessionName>/ per run.
paths:
  dataDir: ./data

# Calibration file path; empty -> identity affine fallback (mock).
calibration_file: ""

# ScanImage bridge (not used in Phase 1 / mock).
scanimage:
  enabled: false
  streamLiveF: false         # mock path: getLiveTraces() returns lastResult_.F directly
  nExpectedCells: 10

# Imaging parameters. Consumed by tfp.hardware.MockScanImageBridge.
imaging:
  frameRate: 30          # Hz
  fovSizePx: 512         # square FOV in pixels
  fovSizeUm: 800         # approximate FOV in microns
  simulateLatency: false # set true to add real acquisition pauses

# Fake cells for the all-optical mock pipeline (Phase 1.5).
# Parsed by tfp.io.loadConfig into a 1×N struct array.
# Converted to tfp.sim.CellResponseModel objects in the experiment script.
fakeCells:
  - tag: cell_01
    dmdCol: 400
    dmdRow: 400
    radiusDmd: 8
    amplitude: 1.5
    sigma: 10
    aiChannel: 0
  - tag: cell_02
    dmdCol: 500
    dmdRow: 400
    radiusDmd: 8
    amplitude: 1.2
    sigma: 10
    aiChannel: 1
  - tag: cell_03
    dmdCol: 600
    dmdRow: 400
    radiusDmd: 8
    amplitude: 1.8
    sigma: 10
    aiChannel: 2

# Laser modulation (NKT FS-50). Ignored in mock mode — included for
# config schema parity with real.yaml.
laser:
  fs50_ao_channel: 'ao3'
  modulation_voltage_max: 5.0
  modulation_voltage_min: 0.0     # 0 V = laser off
  calibration_file: ''
  default_power_mw: 1.0

# Trial timing defaults.
trial:
  preStim_s: 1.0
  stimDuration_s: 0.25
  postStim_s: 3.0
  nReps: 5
  distancesUm: [0, 3, 6, 9, 12, 15, 20, 30, 40]
  shuffle: true
