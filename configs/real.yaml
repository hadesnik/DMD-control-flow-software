# Real hardware config for Phase 3: NI6323 DAQ + DLP650LNIR DMD (ALP-4.3).
# Switch from mock.yaml to this config when the NIR DMD arrives.
# All DLL/device paths are for the scope PC (Windows).
hardwareKind: real

# DMD configuration. Consumed by tfp.hardware.DLP650LNIR_DMD.initialize.
# alpVersion and dmdType default to '4.3'/'DLP650LNIR' when omitted.
dmd:
  dllPath: 'C:\Program Files\ALP-4.3\ALP-4.3 high-speed API\x64\alp4395.dll'
  protoFile: 'vendor\alp\reference\parot-alptool\alpV43x64proto.m'
  loadLatencyMsPerPattern: 10
  debugFigure: false

# DAQ configuration. Consumed by tfp.hardware.NI6323_DAQ.initialize.
daq:
  deviceName: 'Dev1'
  sampleRate: 10000
  analogInChannels: [0, 1, 2, 3]
  analogOutChannels: [0, 1]
  digitalOutChannels:
    - 'port0/line0'    # DMD pattern-advance trigger
    - 'port0/line1'    # Pockels cell gate
    - 'port0/line10'   # ScanImage acquisition trigger
  digitalInChannels:
    - 'port0/line2'    # ScanImage frame clock (rising edge = frame acquired)

# Imaging parameters. Consumed by ScanImageBridge (Phase 2+).
imaging:
  frameRate: 30
  fovSizePx: 512
  fovSizeUm: 800
  simulateLatency: false

# Filesystem paths for session data and calibration.
session:
  dataDir: 'C:\data'
  calibration_file: ''   # fill in after first alignDMDtoCamera run

# Substage widefield camera — Basler acA2500-14um (USB3 Vision, serial 22016738).
# Consumed by tfp.hardware.BaslerSubstageCamera.initialize.
# imaqhwinfo('gentl',1) confirmed: DeviceIDs=[1], SupportedFormats={'Mono8','Mono12'}.
camera:
  class: 'tfp.hardware.BaslerSubstageCamera'
  deviceId: 1
  format: 'Mono8'
  exposureMs: 10        # ms; increase if spots are underexposed
  gain: 0               # dB; 0 = minimum noise
  umPerPixel: 1.56      # µm per camera pixel at the sample; remeasure after mounting

# No fake cells for real hardware — live cells identified by suite2p.
fakeCells: []

# ScanImage bridge: real-time ROI fluorescence streaming (TASK-P3-09).
# streamLiveF requires a frameAcquiredFcn callback on the imaging PC
# (see scripts/si_frame_callback.m) that mssend's F values back per frame.
# %VERIFY with Masato: confirm ROI Integration is enabled before enabling.
scanimage:
  streamLiveF: true          # enable real-time F packet polling in waitForCompletion
  nExpectedCells: 10         # pre-allocate liveF_ accumulator rows
  frameStreamPort: 3043      # same socket as control channel
