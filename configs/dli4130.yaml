# Config for DLi4130 visible-DMD evaluation kit (DLP7000, ALP-4.1, 1024x768 XGA).
# Borrowed from Laura Waller lab for software validation before the NIR DLP650LNIR arrives.
# Switch to real.yaml when the DLP650LNIR (ALP-4.3) arrives.
hardwareKind: real

# DMD configuration. Consumed by tfp.hardware.DLP650LNIR_DMD.initialize.
# alpVersion '4.1' selects alp41.dll and XGA geometry (768×1024).
dmd:
  alpVersion: '4.1'
  dmdType: 'DLP7000'
  dllPath: 'C:\Program Files\ALP-4.1\ALP-4.1 high-speed API\x64\alpD41.dll'
  # Header-based loading is required — the pre-compiled thunk does not correctly
  # marshal the void* data buffer in AlpSeqPut. MinGW must be installed.
  # Path is relative to the MATLAB working directory (repo root).
  headerPath: 'vendor\alp\official-4.1\alp.h'
  nRows: 768
  nCols: 1024
  maxPatternRate: 22727
  # Pixel scale: 13.68 µm pitch / ~40x optical demag → 0.342 µm/px.
  # Central 6×6 mm active region: 6 mm / 13.68 µm/px = 439 px → roiHalfWidthPx = 219.
  # Both values need re-verification once the optical path is measured on the rig.
  umPerPixel: 0.342
  roiHalfWidthPx: 219
  activationKey: '223000-000442-987359'
  deviceSerial: '00D256FC'
  loadLatencyMsPerPattern: 10
  debugFigure: false

# DAQ configuration. Consumed by tfp.hardware.NI6323_DAQ.initialize.
# Confirmed wiring (cross-referenced with Masato's DAQ code, 2026-05-29):
#   ai2: patch electrode / Multiclamp 700B output (primary ephys)
#   ai3: SLM/stim trigger monitor — reads back the stimulation trigger line
#   ao0: Multiclamp 700B ch1 command (postsynaptic cell)
#   ao2: Multiclamp 700B ch2 command (presynaptic cell, normally unused)
#   ao3: NKT FS-50 power modulator (photostim laser power control)
#   port0/line10 (DO): ScanImage acquisition trigger
#   port0/line8  (DO): SLM trigger out (Masato's SLM; spare for our DMD rig)
#   port0/line1  (DI): ScanImage frame clock (rising edge = frame acquired)
daq:
  deviceName: 'Dev1'
  sampleRate: 20000
  analogInChannels: [2, 3]
  aiRangeV: [-5, 5]
  # ai3 reads a 0-5V trigger monitor signal; use SingleEnded not differential.
  aiSingleEndedChannels: [3]
  analogOutChannels: [0, 3]
  digitalOutChannels: [port0/line10]
  # digitalInChannels: [port0/line1]   # frame clock — not yet wired; add when needed

# Imaging parameters. Consumed by ScanImageBridge (Phase 2+).
imaging:
  frameRate: 30
  fovSizePx: 512
  fovSizeUm: 800
  simulateLatency: false

# Filesystem paths for session data and calibration.
paths:
  dataDir: 'C:\data'
  calibration_file: ''

# Laser modulation — NKT FS-50 analog control on ao3.
laser:
  fs50_ao_channel: 'ao3'
  modulation_voltage_max: 5.0
  modulation_voltage_min: 0.0

# No fake cells for real hardware.
fakeCells: []

# bringupMode: skip inter-trial wait (duration_s=0.1, preStim_s=0) for
# rapid visual pattern verification. Set false before real experiments.
bringupMode: true

# testTargets: DMD [col, row] pairs for bringup testing (no ScanImage needed).
# Single center target — used by ppsf_lateral (sweep offsets applied in script).
# Remove once the ScanImage link is live.
testTargets: [512, 384]

# bringupGrid: when true, exp_rapid_sequential generates a 7x7 target grid
# across the active DMD region (overrides testTargets). Set false when
# testTargets or ScanImage ROIs should be used instead.
bringupGrid: true

# bringupDuration_s: stim duration per trial in bringupMode, for visual DMD
# inspection. 5 s gives enough time to walk over to the DMD and verify the pattern.
bringupDuration_s: 0.25
